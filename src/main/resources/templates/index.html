<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            background: linear-gradient(160deg, #1c2e4a 0%, #243b55 50%, #1a2a3d 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            color: #e8f0fe;
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: linear-gradient(160deg, rgba(255,255,255,0.11) 0%, rgba(255,255,255,0.05) 100%);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-bottom-color: rgba(255,255,255,0.06);
            border-right-color: rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 32px 28px;
            backdrop-filter: blur(16px);
            box-shadow:
                0 2px 0 rgba(255,255,255,0.08) inset,       /* top inner highlight */
                0 -1px 0 rgba(0,0,0,0.3) inset,             /* bottom inner shadow */
                0 8px 16px rgba(0,0,0,0.25),                /* close shadow */
                0 24px 48px rgba(0,0,0,0.35),               /* mid shadow */
                0 48px 80px rgba(0,0,0,0.2);                /* deep ambient */
        }

        /* Search */
        .search-form {
            display: flex;
            gap: 8px;
            margin-bottom: 28px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            color: #e8f0fe;
            font-family: 'Nunito', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]::placeholder { color: rgba(232,240,254,0.45); }
        input[type="text"]:focus { border-color: rgba(100,180,255,0.5); }

        .btn {
            background: #4a9eff;
            color: #fff;
            border: none;
            padding: 12px 18px;
            border-radius: 12px;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
        }

        .btn:hover { background: #66aeff; transform: translateY(-1px); }

        /* Current weather */
        .weather-main {
            text-align: center;
            padding: 8px 0 24px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }

        .city {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .condition {
            font-size: 0.88rem;
            color: rgba(232,240,254,0.6);
            text-transform: capitalize;
            margin-bottom: 16px;
        }

        .temp {
            font-size: 5rem;
            font-weight: 300;
            line-height: 1;
            margin-bottom: 4px;
        }

        .temp sup { font-size: 1.8rem; vertical-align: super; }

        /* Stats row */
        .stats {
            display: flex;
            justify-content: center;
            gap: 28px;
            margin-top: 16px;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 0.85rem;
            color: rgba(232,240,254,0.7);
        }

        .stat i { color: #4a9eff; font-size: 0.9rem; }

        /* Forecast */
        .forecast-label {
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: rgba(232,240,254,0.45);
            margin-bottom: 12px;
        }

        .forecast-row {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: none;
            padding-bottom: 4px;
        }

        .forecast-row::-webkit-scrollbar { display: none; }

        .fc {
            flex: 1;
            min-width: 72px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 12px 8px;
            text-align: center;
            transition: background 0.2s;
        }

        .fc:hover { background: rgba(74,158,255,0.1); border-color: rgba(74,158,255,0.25); }

        .fc-day { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: rgba(232,240,254,0.5); margin-bottom: 8px; }
        .fc i { font-size: 1.3rem; color: #ffc06e; margin-bottom: 6px; display: block; }
        .fc-temp { font-size: 0.95rem; font-weight: 700; }
        .fc-desc { font-size: 0.62rem; color: rgba(232,240,254,0.5); text-transform: capitalize; margin-top: 3px; line-height: 1.3; }

        /* Empty */
        .empty {
            text-align: center;
            padding: 24px 0 8px;
            color: rgba(232,240,254,0.4);
        }

        .empty i { font-size: 2.8rem; margin-bottom: 10px; display: block; }
        .empty p { font-size: 0.88rem; line-height: 1.6; }

        @media (min-width: 480px) {
            .forecast-row { overflow-x: visible; }
        }
    </style>
</head>

<body>
<div class="card">

    <!-- Search -->
    <form th:action="@{/getWeather}" method="post" class="search-form">
        <input type="text" name="city" placeholder="Search city..." required autocomplete="off" />
        <button type="submit" class="btn"><i class="fa-solid fa-magnifying-glass"></i></button>
    </form>

    <!-- Current Weather -->
    <div th:if="${weatherData}" class="weather-main">
        <div class="city" th:text="${weatherData.city}">London</div>
        <div class="condition" th:text="${weatherData.description}">Clear sky</div>
        <div class="temp"><span th:text="${weatherData.temp}">22</span><sup>°C</sup></div>
        <div class="stats">
            <div class="stat">
                <i class="fa-solid fa-droplet"></i>
                <span><span th:text="${weatherData.humidity}">65</span>% humidity</span>
            </div>
            <div class="stat">
                <i class="fa-solid fa-wind"></i>
                <span th:text="${weatherData.description}">Cloudy</span>
            </div>
        </div>
    </div>

    <!-- 5-Day Forecast -->
    <div th:if="${forecastData}">
        <div class="forecast-label">5-Day Forecast</div>
        <div class="forecast-row">
            <div class="fc" th:each="day : ${forecastData}">
                <div class="fc-day" th:text="${day.date}">Mon</div>
                <i class="fa-solid fa-cloud-sun"></i>
                <div class="fc-temp"><span th:text="${day.temp}">21</span>°</div>
                <div class="fc-desc" th:text="${day.description}">Cloudy</div>
            </div>
        </div>
    </div>

    <!-- Empty state -->
    <div th:unless="${weatherData}" class="empty">
        <i class="fa-solid fa-cloud-sun"></i>
        <p>Enter a city name above<br>to see the weather.</p>
    </div>

</div>
</body>
</html>
